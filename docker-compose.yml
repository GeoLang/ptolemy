services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ptolemy
      POSTGRES_PASSWORD: ptolemy
      POSTGRES_DB: ptolemy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptolemy"]
      interval: 2s
      timeout: 5s
      retries: 10

  ptolemy:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ptolemy:ptolemy@db/ptolemy
      RUST_LOG: info,ptolemy=debug
      PTOLEMY_JWT_SECRET: change-me-in-production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: ["ptolemy", "serve", "--bind", "0.0.0.0:3000", "--database-url", "postgres://ptolemy:ptolemy@db/ptolemy"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

volumes:
  pgdata:
